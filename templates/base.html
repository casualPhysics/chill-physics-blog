<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Casual Physics Enjoyer{% endblock %}</title>
<link rel="stylesheet" href="{{ root }}style.css">
<script>
  MathJax = { tex: {inlineMath: [['$','$'], ['\\(','\\)']]}, svg: {fontCache: 'global'} };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<div class="site">
  <header class="site-header">
    <h1 class="site-title"><a href="{{ root }}index.html">Casual Physics Enjoyer</a></h1>
    <p class="site-tagline">I try to do science in my house &mdash; also on <a href="https://chillphysicsenjoyer.substack.com/">Substack</a>.</p>
    <nav class="site-nav">
      <a href="{{ root }}index.html">Home</a>
      <a href="{{ root }}archive.html">Archive</a>
      <a href="{{ root }}about.html">About</a>
    </nav>
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Mirror of <a href="https://chillphysicsenjoyer.substack.com/">chillphysicsenjoyer.substack.com</a>.
       Built statically, in the spirit of <a href="https://johncarlosbaez.wordpress.com/">Azimuth</a>.</p>
  </footer>
</div>
</body>
</html>
